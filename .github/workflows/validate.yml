name: Validate Corporesapiens

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Validate incremental JavaScript
        run: |
          set -euo pipefail
          for f in app-v*.js; do
            node --check "$f"
          done

      - name: Build consolidated 1.0 brand v2
        run: |
          chmod +x scripts/build-v10.sh
          scripts/build-v10.sh . dist-v10

      - name: Validate consolidated output
        run: |
          set -euo pipefail
          test -s dist-v10/app-v10.js
          test -s dist-v10/styles-v10.css
          test -s dist-v10/privacy.html
          test -s dist-v10/terms.html
          test -s dist-v10/comprar.html
          test -s dist-v10/comece.html
          test -s dist-v10/favicon.ico
          test -s dist-v10/assets/apple-touch-icon.png
          test -s dist-v10/assets/corporesapiens-icon-192.png
          test -s dist-v10/assets/corporesapiens-icon-512.png
          test -s dist-v10/PRODUCTION_SHA256SUMS.txt
          node --check dist-v10/app-v10.js
          grep -q 'app-v10.js' dist-v10/index.html
          grep -q 'styles-v10.css' dist-v10/index.html
          grep -q 'apple-touch-icon.png' dist-v10/index.html
          grep -q 'corporesapiens-v1.0.1-brand-v2' dist-v10/sw.js
          grep -q 'corporesapiens-icon-512.png' dist-v10/manifest.webmanifest
          file dist-v10/assets/corporesapiens-icon-192.png | grep -q 'PNG image data, 192 x 192'
          file dist-v10/assets/corporesapiens-icon-512.png | grep -q 'PNG image data, 512 x 512'
          file dist-v10/assets/apple-touch-icon.png | grep -q 'PNG image data, 180 x 180'

      - name: Validate security configuration
        run: |
          test -s nginx/default.conf
          grep -q 'Content-Security-Policy' nginx/default.conf
          grep -q 'Permissions-Policy' nginx/default.conf
          grep -q 'X-Content-Type-Options' nginx/default.conf

      - name: Validate documentation
        run: |
          test -s docs/INVENTARIO.md
          test -s docs/CANONICO.md
          test -s docs/corporesapiens.json
          test -s docs/CHANGELOG.md
          test -s docs/release-v1.0.json
