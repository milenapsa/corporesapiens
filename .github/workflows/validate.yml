name: Validate Corporesapiens

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate source JavaScript
        run: |
          set -euo pipefail
          for f in app-core.js app-smart.js app-v*.js; do
            node --check "$f"
          done

      - name: Build consolidated 1.0
        run: |
          chmod +x scripts/build-v10.sh
          scripts/build-v10.sh . dist-v10

      - name: Validate consolidated output
        run: |
          set -euo pipefail
          test -s dist-v10/app-v10.js
          test -s dist-v10/styles-v10.css
          node --check dist-v10/app-v10.js
          grep -q 'app-v10.js' dist-v10/index.html
          grep -q 'styles-v10.css' dist-v10/index.html
          grep -q 'corporesapiens-v1.0.0' dist-v10/sw.js
          grep -q '"./app-v10.js"' dist-v10/sw.js
          grep -q '"./styles-v10.css"' dist-v10/sw.js

      - name: Validate documentation
        run: |
          test -s docs/INVENTARIO.md
          test -s docs/CANONICO.md
          test -s docs/corporesapiens.json
          test -s docs/CHANGELOG.md
          test -s docs/release-v1.0.json
