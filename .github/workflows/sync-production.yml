name: Sync effective production snapshot

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/sync-production.yml"

permissions:
  contents: write

concurrency:
  group: corporesapiens-production-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Capture effective production
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://corporesapiens.homosapiens.id"
          STAMP="${GITHUB_SHA}-$(date -u +%Y%m%d%IM%M)"
          mkdir -p assets

          files=(
            index.html
            app-v10.js
            styles-v10.css
            styles-v11.css
            styles-v12.css
            manifest.webmanifest
            sw.js
            favicon.ico
            comprar.html
            comece.html
            terms.html
            privacy.html
            corporesapiens-og.png
            assets/apple-touch-icon.png
            assets/corporesapiens-icon-192.png
            assets/corporesapiens-icon-512.png
          )

          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            curl --fail --silent --show-error --location \
              --retry 4 --retry-all-errors \
              -H 'Cache-Control: no-cache' \
              "$BASE/$file?sync=$STAMP" \
              --output "$file"
            test -s "$file"
          done

          grep -q 'app-v10.js' index.html
          grep -q 'styles-v12.css' index.html
          grep -q 'CORPORESAPIENS UI V12' styles-v12.css
          grep -q 'corporesapiens-icon-512.png' manifest.webmanifest
          file assets/corporesapiens-icon-192.png | grep -q 'PNG image data'
          file assets/corporesapiens-icon-512.png | grep -q 'PNG image data'
          file assets/apple-touch-icon.png | grep -q 'PNG image data'
          file favicon.ico | grep -Eq 'icon|MS Windows'

          sha256sum "${files[@]}" | tee PRODUCTION_SHA256SUMS.txt

      - name: Commit synchronized production
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html app-v10.js styles-v10.css styles-v11.css styles-v12.css \
            manifest.webmanifest sw.js favicon.ico \
            comprar.html comece.html terms.html privacy.html corporesapiens-og.png \
            assets/apple-touch-icon.png assets/corporesapiens-icon-192.png \
            assets/corporesapiens-icon-512.png PRODUCTION_SHA256SUMS.txt

          if git diff --cached --quiet; then
            echo "PRODUCTION_ALREADY_SYNCHRONIZED"
            exit 0
          fi

          git commit -m "chore: synchronize effective production UI V12"
          git push
          echo "PRODUCTION_SYNC_COMMITTED_OK"
